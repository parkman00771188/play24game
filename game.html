<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>24 GAME - 빠른 시작</title>
    <meta name="description" content="24 GAME 빠른 시작 플레이 화면" />
    <base href="/" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell play-app" aria-label="24 GAME 빠른 시작">
      <div class="sky-layer" aria-hidden="true">
        <span class="cloud cloud-one"></span>
        <span class="cloud cloud-two"></span>
        <span class="cloud cloud-three"></span>
        <span class="spark sparkle-a"></span>
        <span class="spark sparkle-b"></span>
        <span class="spark sparkle-c"></span>
      </div>

      <section class="play-screen">
        <header class="play-top-card">
          <a class="brand-mark play-brand image-brand image-play-brand" href="./index.html" aria-label="홈으로 이동">
            <img class="brand-logo-image" src="./assets/optimized/logo.webp" alt="" />
          </a>
          <div class="room-title">
            <strong>방 #2408</strong>
            <span>도전자 1명 · 대기 9명</span>
          </div>
          <div class="room-actions" aria-label="방 메뉴">
            <button class="room-icon" type="button" aria-label="참가자 보기">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M16 11a4 4 0 1 0-8 0" />
                <path d="M4 21c.8-4.4 4-7 8-7s7.2 2.6 8 7" />
              </svg>
              <span>10</span>
            </button>
            <button class="room-icon js-game-settings" type="button" aria-label="게임 설정 열기">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" />
                <path
                  d="M19.4 14.4c.1-.5.1-1 .1-1.4s0-.9-.1-1.4l2-1.5-2-3.5-2.4 1a8.8 8.8 0 0 0-2.4-1.4L14.3 3h-4.1l-.4 3.2c-.9.3-1.7.8-2.4 1.4l-2.4-1-2 3.5 2 1.5c-.1.5-.1 1-.1 1.4s0 .9.1 1.4l-2 1.5 2 3.5 2.4-1c.7.6 1.5 1.1 2.4 1.4l.4 3.2h4.1l.4-3.2c.9-.3 1.7-.8 2.4-1.4l2.4 1 2-3.5-2.1-1.5z"
                />
              </svg>
            </button>
            <a class="room-icon leave-icon" href="./index.html" aria-label="방 나가기">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10 4H5v16h5" />
                <path d="M13 8l4 4-4 4" />
                <path d="M9 12h8" />
              </svg>
            </a>
          </div>
        </header>

        <section class="challenger-card" aria-label="도전자 현황">
          <strong>현재 도전자</strong>
          <div class="challenger-avatars">
            <span class="challenger-avatar active" aria-label="현재 도전자 1명">
              <img src="./assets/optimized/character/transparent/char_boy_1.webp" alt="" />
            </span>
            <span class="challenger-name">플레이어24</span>
            <em>+6</em>
          </div>
          <button class="hand-button compact-hand js-hand" type="button">
            <span aria-hidden="true">✋</span>
            도전하기
          </button>
        </section>

        <section class="round-dashboard" aria-label="게임 현황">
          <article class="goal-card">
            <span>목표 숫자</span>
            <strong><i class="target-dot flat" aria-hidden="true"></i><span class="js-target-value">24</span></strong>
          </article>

          <div class="round-mascot" aria-hidden="true">
            <img src="./assets/optimized/mascot.webp" alt="" />
            <p class="mascot-speech js-mascot-speech" hidden>머리를 굴려야지</p>
            <div>현재 도전자 1명</div>
          </div>

          <article class="timer-card">
            <div>
              <span>남은 시간</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 8v5l3 2" />
                <path d="M9 2h6" />
                <path d="M12 5a8 8 0 1 0 0 16 8 8 0 0 0 0-16z" />
              </svg>
            </div>
            <strong class="js-time">00:10</strong>
            <div class="time-track" aria-hidden="true"><span class="js-time-track"></span></div>
          </article>
        </section>

        <section class="number-board js-number-board" aria-label="숫자 카드" aria-live="polite">
          <button class="number-card js-number-card" type="button">7</button>
          <button class="number-card js-number-card" type="button">4</button>
          <button class="number-card js-number-card" type="button">6</button>
          <button class="number-card js-number-card bottom-card" type="button">2</button>
        </section>

        <section class="operator-panel" aria-label="연산자">
          <div class="operator-grid">
            <button class="operator-button js-operator" type="button" data-operator="+">+</button>
            <button class="operator-button js-operator" type="button" data-operator="-">−</button>
            <button class="operator-button js-operator" type="button" data-operator="×">×</button>
            <button class="operator-button js-operator" type="button" data-operator="÷">÷</button>
            <button class="calculate-button js-calculate" type="button">연산하기</button>
          </div>
        </section>

        <section class="chat-dock js-chat-dock" aria-label="채팅">
          <button class="chat-toggle js-chat-toggle" type="button" aria-expanded="false" aria-controls="gameChatPanel">
            <span class="chat-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M5 6.5h14v9.5H9.2L5 20v-3.9z" />
                <path d="M8.5 10h7" />
                <path d="M8.5 13h4.5" />
              </svg>
            </span>
            <span>
              <strong>채팅</strong>
              <small>추천 문구를 골라보세요</small>
            </span>
            <i aria-hidden="true"></i>
          </button>
          <div class="chat-scrim js-chat-scrim" hidden></div>
          <div class="chat-panel js-chat-panel" id="gameChatPanel" aria-hidden="true">
            <div class="chat-panel-header">
              <strong>추천 문구</strong>
              <button class="js-chat-close" type="button">닫기</button>
            </div>
            <div class="quick-chat-options" aria-label="추천 문구 선택">
              <button class="js-chat-phrase" type="button">머리를 굴려야지</button>
              <button class="js-chat-phrase" type="button">주무시나요?</button>
              <button class="js-chat-phrase" type="button">오오 대박</button>
              <button class="js-chat-phrase" type="button">최고네요^^</button>
            </div>
            <div class="chat-messages compact-status js-chat-messages" aria-live="polite">
              <p class="chat-status js-history">카드 2장과 연산자를 선택하세요</p>
            </div>
          </div>
        </section>
      </section>

      <dialog class="game-dialog game-settings-dialog" id="gameSettingsDialog" aria-labelledby="game-settings-title">
        <div class="dialog-card game-settings-card">
          <div class="dialog-header">
            <button class="back-button js-close-game-settings" type="button" aria-label="게임 설정 닫기">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6" /></svg>
            </button>
            <h2 id="game-settings-title">게임 설정</h2>
          </div>

          <div class="game-setting-stack">
            <section class="game-setting-box" aria-labelledby="card-count-title">
              <div>
                <strong id="card-count-title">카드 숫자</strong>
                <span>이번 판에 사용할 카드 개수</span>
              </div>
              <div class="setting-segment" role="group" aria-label="카드 숫자 선택">
                <button class="js-card-count active" type="button" data-count="4">4장</button>
                <button class="js-card-count" type="button" data-count="5">5장</button>
                <button class="js-card-count" type="button" data-count="6">6장</button>
              </div>
            </section>

            <section class="game-setting-box" aria-labelledby="target-number-title">
              <div>
                <strong id="target-number-title">목표 숫자</strong>
                <span>계산 결과로 만들 숫자</span>
              </div>
              <div class="target-number-field" role="group" aria-label="목표 숫자 조절">
                <button class="js-target-minus" type="button" aria-label="목표 숫자 1 줄이기">−</button>
                <input class="js-target-input" type="number" inputmode="numeric" min="1" max="1000" value="24" />
                <button class="js-target-plus" type="button" aria-label="목표 숫자 1 늘리기">+</button>
                <small>최대 1000</small>
              </div>
            </section>

            <section class="game-setting-box" aria-labelledby="timer-setting-title">
              <div>
                <strong id="timer-setting-title">타이머 시간</strong>
                <span>이번 판 제한 시간</span>
              </div>
              <div class="setting-segment timer-choice-segment" role="group" aria-label="타이머 시간 선택">
                <button class="js-timer-choice active" type="button" data-timer="10">10초</button>
                <button class="js-timer-choice" type="button" data-timer="15">15초</button>
                <button class="js-timer-choice" type="button" data-timer="20">20초</button>
              </div>
            </section>
          </div>

          <div class="game-settings-actions">
            <button class="secondary-action js-reset-game-settings" type="button">초기화</button>
            <button class="primary-action js-apply-game-settings" type="button">적용하기</button>
          </div>
        </div>
      </dialog>

      <div class="toast" role="status" aria-live="polite"></div>
    </main>

    <script src="./scripts/sounds.js"></script>
    <script src="./scripts/game.js"></script>
  </body>
</html>
